services:
  oracle:
    image: ${ORACLE_IMAGE:-container-registry.oracle.com/database/free:latest}
    container_name: oracle-free
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: OraclePwd_2025
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'SELECT 1 FROM dual;' | sqlplus -s / as sysdba"]
      interval: 10s
      timeout: 5s
      retries: 30
volumes:
  oracle-data: